---
- name: Deploy WAR from Nexus to Tomcat
  hosts: tomcat
  become: yes

  vars:
    nexus_url: "http://52.66.139.118:8081/repository/calculator-web-application-Snap/com/example/calculator-web-application/0.0.1-SNAPSHOT/calculator-web-application-0.0.1-20260714.233256-13.war"
    nexus_user: "admin"
    nexus_password: "1qazXSW@#EDC"

  tasks:

    - name: Stop Tomcat
      shell: /opt/tomcat/bin/shutdown.sh
      ignore_errors: yes

    - name: Remove old WAR
      file:
        path: /opt/tomcat/webapps/calculator.war
        state: absent

    - name: Remove old exploded application
      file:
        path: /opt/tomcat/webapps/calculator
        state: absent

    - name: Download WAR from Nexus
      get_url:
        url: "{{ nexus_url }}"
        dest: /opt/tomcat/webapps/calculator.war
        url_username: "{{ nexus_user }}"
        url_password: "{{ nexus_password }}"
        force_basic_auth: yes
        mode: '0644'

    - name: Start Tomcat
      shell: /opt/tomcat/bin/startup.sh
